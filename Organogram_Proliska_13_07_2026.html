<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Проліска 2026">
<meta name="theme-color" content="#0b1220">
<meta name="mobile-web-app-capable" content="yes">
<title>ГО «Проліска» — Оргструктура 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080d1a;
    --surface: #0e1525;
    --card: #141e32;
    --card-hover: #1a2840;
    --accent: #4f8ef7;
    --accent2: #00d4ff;
    --violet: #9b72f6;
    --gold: #f5a623;
    --green: #22c97a;
    --red: #ff4f4f;
    --orange: #ff8c42;
    --text: #e2e8f0;
    --text-muted: #7a8aa0;
    --border: rgba(79,142,247,0.18);
    --line: rgba(79,142,247,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden;
  }

  /* === HEADER === */
  .header {
    background: linear-gradient(90deg, #080d1a 0%, #0c1428 60%, #080d1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 200;
    backdrop-filter: blur(16px);
  }
  .header-text h1 { font-family:'Unbounded',sans-serif; font-size:15px; font-weight:600; }
  .header-text p { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .header-right { margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .search-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px;
    color: var(--text); font-size:13px; font-family:'Inter',sans-serif;
    outline:none; width:220px; transition:border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color:var(--text-muted); }
  .btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius:8px; padding:7px 14px; color:var(--text-muted);
    font-size:12px; cursor:pointer; transition:all 0.2s; font-family:'Inter',sans-serif;
    white-space: nowrap;
  }
  .btn:hover { background:var(--card-hover); color:var(--text); border-color:var(--accent); }
  input[type=file] { display:none; }

  /* === PROJECT TABS === */
  .tabs {
    display:flex; gap:6px; padding:8px 24px; flex-wrap:wrap;
    background:var(--surface); border-bottom:1px solid var(--border);
    position:sticky; top:63px; z-index:190;
  }
  .tab {
    background:var(--card); border:1px solid var(--border); border-radius:9px;
    padding:7px 15px; color:var(--text-muted); font-size:12px; cursor:pointer;
    transition:all 0.2s; display:flex; align-items:center; gap:8px;
    font-family:'Inter',sans-serif;
  }
  .tab:hover { background:var(--card-hover); color:var(--text); }
  .tab.active {
    background:linear-gradient(135deg,#12294f,#0e1b3a);
    border-color:var(--tabc,var(--accent)); color:var(--text);
    box-shadow:0 0 14px color-mix(in srgb, var(--tabc,var(--accent)) 25%, transparent);
  }
  .tab .tab-dot { width:8px; height:8px; border-radius:50%; background:var(--tabc,var(--accent)); flex-shrink:0; }
  .tab .tab-count {
    font-size:10px; background:rgba(255,255,255,0.07);
    padding:1px 7px; border-radius:10px; color:var(--text-muted);
  }
  .tab.active .tab-count { background:var(--tabc,var(--accent)); color:#04101f; font-weight:700; }

  /* === STATS === */
  .stats-bar {
    display:flex; gap:0; border-bottom:1px solid var(--border); overflow-x:auto;
    background: var(--surface);
  }
  .stat {
    padding:9px 22px; display:flex; align-items:center; gap:10px;
    border-right:1px solid var(--border); flex-shrink:0;
  }
  .stat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .stat-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; }
  .stat-value { font-size:13px; font-weight:600; color:var(--text); }

  /* === LEGEND === */
  .legend {
    display:flex; gap:18px; flex-wrap:wrap; padding:7px 24px;
    border-bottom:1px solid var(--border); font-size:11px; color:var(--text-muted);
    background:var(--surface);
  }
  .legend-item { display:flex; align-items:center; gap:6px; }
  .legend-dot { width:7px; height:7px; border-radius:50%; }

  /* === LAYOUT === */
  .main { display:flex; height:calc(100vh - 190px); }

  /* === SIDEBAR === */
  .sidebar {
    width:265px; flex-shrink:0;
    border-right:1px solid var(--border); overflow-y:auto;
    background:var(--surface);
  }
  .sidebar-section { border-bottom:1px solid var(--border); }
  .sidebar-title {
    padding:10px 16px; font-size:10px; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--text-muted); font-weight:600;
    background:rgba(255,255,255,0.02);
  }
  .dept-item {
    padding:8px 16px; display:flex; align-items:center; gap:10px;
    cursor:pointer; transition:background 0.15s; border-left:3px solid transparent;
  }
  .dept-item:hover { background:var(--card); }
  .dept-item.active { background:var(--card); border-left-color:var(--accent); }
  .dept-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .dept-name { font-size:12px; color:var(--text); flex:1; }
  .dept-email { font-size:10px; color:var(--text-muted); margin-top:1px; }
  .dept-phone { font-size:10px; color:var(--accent2); }
  .dept-count { font-size:10px; color:var(--text-muted); margin-left:auto; }

  /* === CHART === */
  .chart-area {
    flex:1; overflow:auto; padding:28px;
    background: radial-gradient(ellipse at 30% 20%, rgba(79,142,247,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(0,212,255,0.03) 0%, transparent 60%),
                var(--bg);
  }
  .org-chart { min-width:700px; display:flex; justify-content:center; }

  /* === NODES === */
  .tree-node {
    display:inline-flex; flex-direction:column; align-items:center;
    margin:0 5px; vertical-align:top;
  }
  .children-row {
    display:flex; justify-content:center; padding-top:28px;
    position:relative; gap:10px; flex-wrap:wrap;
    max-width:1400px;
  }
  .children-row::before {
    content:''; position:absolute; top:0; left:50%;
    width:1px; height:28px; background:var(--line); transform:translateX(-50%);
  }

  /* === CARDS === */
  .card {
    background:var(--card); border:1px solid var(--border);
    border-radius:9px; padding:8px 10px; width:142px;
    cursor:pointer; transition:all 0.2s; position:relative; text-align:center;
    border-top-width:3px;
  }
  .card:hover {
    background:var(--card-hover); transform:translateY(-2px);
    box-shadow:0 8px 28px rgba(0,0,0,0.4);
  }
  .card.org, .card.head {
    width:172px; background:linear-gradient(135deg,#0d2147,#0e1b3a);
    border-color:var(--accent); box-shadow:0 0 24px rgba(79,142,247,0.2);
  }
  .card.proj {
    width:200px; background:linear-gradient(135deg,#0c1e38,#0a1730);
  }
  .card.deputy { background:linear-gradient(135deg,#0c1e38,#0a1730); border-color:var(--accent2); }
  .card.group {
    background:#0d1526; border-style:solid;
    border-color:rgba(122,138,160,0.35);
  }
  .card.loc { background:#0c1a22; border-color:rgba(34,201,122,0.35); }
  .card.position {
    background:#0a0f1e; border-style:dashed; border-color:rgba(255,79,79,0.35);
    opacity:0.8;
  }
  .card.highlight-match {
    border-color:var(--gold) !important;
    box-shadow:0 0 22px rgba(245,166,35,0.65), 0 0 6px rgba(245,166,35,0.25) inset !important;
    transform:translateY(-2px) !important;
    z-index:10; position:relative;
    opacity:1 !important; filter:none !important;
  }
  .card.search-dim {
    opacity:0.2; filter:grayscale(0.6);
    transition:opacity 0.25s, filter 0.25s;
  }
  .search-pill {
    display:none; position:fixed; top:75px; right:16px;
    background:var(--gold); color:#000;
    font-size:12px; font-weight:700; padding:4px 14px;
    border-radius:20px; z-index:300;
    box-shadow:0 2px 12px rgba(245,166,35,0.5);
    pointer-events:none; font-family:'Inter',sans-serif;
  }
  .search-arrows {
    display:none; position:fixed; top:70px; right:140px;
    z-index:300; gap:4px; align-items:center;
  }
  .search-arrows.on { display:flex; }
  .sarr {
    background:var(--card); border:1px solid var(--border); color:var(--text);
    font-size:14px; width:28px; height:28px; border-radius:7px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  .sarr:hover { background:var(--gold); color:#000; border-color:var(--gold); }

  .card-tag {
    display:inline-block; font-size:9px; text-transform:uppercase;
    letter-spacing:0.06em; padding:2px 7px; border-radius:4px;
    margin:0 2px 5px; font-weight:600;
  }
  .card-name { font-size:11px; font-weight:600; color:var(--text); line-height:1.25; }
  .card-role { font-size:9px; color:var(--text-muted); margin-top:2px; line-height:1.25;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .card-email { font-size:9px; color:var(--accent); margin-top:3px; opacity:0.8; word-break:break-all; }
  .card-phone { font-size:9px; color:var(--accent2); margin-top:1px; opacity:0.8; }
  .card-badge {
    position:absolute; top:-7px; right:-7px;
    min-width:18px; height:18px; border-radius:9px; padding:0 4px;
    font-size:9px; font-weight:700;
    display:flex; align-items:center; justify-content:center; color:white;
  }
  .toggle-btn {
    width:20px; height:20px; border-radius:50%;
    background:var(--accent); border:none; color:white;
    font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    margin-top:4px; transition:all 0.2s; flex-shrink:0;
  }
  .toggle-btn:hover { background:var(--accent2); transform:scale(1.1); }

  /* === INFO PANEL === */
  .info-panel {
    width:310px; flex-shrink:0; border-left:1px solid var(--border);
    background:var(--surface); overflow-y:auto;
    transform:translateX(100%); transition:transform 0.3s;
    position:fixed; right:0; top:190px; bottom:0; z-index:150;
  }
  .info-panel.open { transform:translateX(0); }
  .info-header {
    padding:20px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--surface); z-index:1;
  }
  .info-close {
    position:absolute; top:16px; right:16px;
    background:none; border:none; color:var(--text-muted); font-size:18px; cursor:pointer;
  }
  .info-name { font-size:15px; font-weight:600; margin-top:8px; line-height:1.3; }
  .info-role { font-size:12px; color:var(--text-muted); margin-top:4px; line-height:1.4; }
  .info-body { padding:20px; }
  .info-section { margin-bottom:18px; }
  .info-section-title { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:8px; }
  .info-detail {
    display:flex; align-items:flex-start; gap:8px;
    margin-bottom:8px; padding:8px 10px; background:var(--card);
    border-radius:8px; border:1px solid var(--border);
  }
  .info-detail-label { font-size:10px; color:var(--text-muted); }
  .info-detail-value { font-size:12px; color:var(--text); word-break:break-word; }
  .info-child {
    display:flex; gap:8px; margin-bottom:6px; padding:7px 10px;
    background:var(--card); border-radius:7px; border:1px solid var(--border);
    cursor:pointer; transition:background .15s;
  }
  .info-child:hover { background:var(--card-hover); }
  .info-child-dot { width:6px; height:6px; border-radius:50%; margin-top:4px; flex-shrink:0; }

  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:#1e2d45; border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:#2d4060; }

  @media (max-width: 900px) { .sidebar { display:none; } }

  /* === СВЕТЛАЯ ТЕМА === */
  body.light {
    --bg:#eef2f8; --surface:#ffffff; --card:#ffffff; --card-hover:#f2f6fd;
    --accent:#2f6fe4; --accent2:#0693c4; --violet:#7c5cd6; --gold:#c07d0a;
    --green:#149257; --red:#d63c3c; --orange:#d96a1e;
    --text:#17233c; --text-muted:#5c6b85;
    --border:#d7deea; --line:#94a3bf;
  }
  body.light .header { background:#ffffff; }
  body.light .card { box-shadow:0 1px 4px rgba(23,35,60,0.08); }
  body.light .card.org, body.light .card.head,
  body.light .card.proj, body.light .card.deputy { background:#f4f8ff; }
  body.light .card.group { background:#f6f8fb; }
  body.light .card.loc { background:#f2faf5; }
  body.light .card.position { background:#fdf6f6; }
  body.light .chart-area { background:var(--bg); }
  body.light .tab.active { background:#e8f0ff; }

  /* === ПОЛОТНО (органограмма с zoom/pan) === */
  #canvasView { display:none; height:calc(100vh - 190px); position:relative; background:var(--bg); }
  body.canvas-mode #canvasView { display:block; }
  body.canvas-mode .main { display:none; }
  #cvStage { position:absolute; inset:0; overflow:hidden; cursor:grab; touch-action:none; }
  #cvStage.dragging { cursor:grabbing; }
  #cvSvg { width:100%; height:100%; display:block; }
  .cv-toolbar {
    position:absolute; top:12px; left:16px; z-index:30;
    display:flex; gap:6px; align-items:center;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:6px 8px;
    box-shadow:0 4px 18px rgba(0,0,0,0.25);
  }
  #cvZoomLabel { font-size:11px; color:var(--text-muted); min-width:40px; text-align:center; }
  .edge { stroke:var(--line); stroke-width:1.2; fill:none; }
  .nd rect.box { fill:var(--card); stroke:var(--border); stroke-width:1; }
  body.light .nd rect.box { stroke:#8d99b5; }
  .nd text.nm { fill:var(--text); font:600 8.5px 'Inter',sans-serif; }
  .nd text.rl { fill:var(--text-muted); font:7px 'Inter',sans-serif; }
  .nd text.tg { font:600 6px 'Inter',sans-serif; letter-spacing:.03em; }
  .nd { cursor:pointer; }
  .nd:hover rect.box { stroke:var(--accent2); stroke-width:1.6; }
  .nd.vac rect.box { stroke:var(--red); stroke-dasharray:4 3; opacity:.85; }
  .nd.hl rect.box { stroke:var(--gold); stroke-width:2.5; filter:drop-shadow(0 0 8px rgba(245,166,35,.8)); }
  .nd.pack rect.box { stroke-width:1.4; }
  /* режим «лише вакансії»: заповнені позиції гаснуть */
  body.vac-mode .nd:not(.vac) { opacity:.18; }
  body.vac-mode .nd.vac rect.box { stroke-width:2; filter:drop-shadow(0 0 6px rgba(255,79,79,.6)); }
  body.vac-mode .card:not(.position) { opacity:.25; }
  body.vac-mode .card.position { box-shadow:0 0 0 2px var(--red); }
  .btn.on { background:var(--red); color:#fff; border-color:var(--red); }
  /* iOS Safari: безпечні зони та коректні жести */
  body { -webkit-text-size-adjust:100%; overscroll-behavior:none; }
  header { padding-top:max(14px, env(safe-area-inset-top)); }
  #cvStage { touch-action:none; -webkit-user-select:none; user-select:none; }
  #infoPanel { padding-bottom:max(16px, env(safe-area-inset-bottom)); }
  @media (max-width:640px) {
    #helpBox { max-height:88vh; padding:18px 16px; }
    .btn { padding:7px 10px; font-size:12px; }
  }
  #helpOverlay { display:none; position:fixed; inset:0; background:rgba(3,7,18,.72);
    z-index:200; align-items:center; justify-content:center; padding:20px; }
  #helpOverlay.open { display:flex; }
  #helpBox { background:var(--card); border:1px solid var(--border); border-radius:14px;
    max-width:640px; width:100%; max-height:82vh; overflow:auto; padding:22px 24px; position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.5); }
  #helpBox h2 { font-size:17px; margin:0 0 4px; color:var(--text); }
  #helpBox h3 { font-size:13px; margin:16px 0 6px; color:var(--accent); letter-spacing:.02em; }
  #helpBox p, #helpBox li { font-size:12.5px; color:var(--text-muted); line-height:1.6; }
  #helpBox ul { margin:4px 0 0 18px; padding:0; }
  #helpBox b { color:var(--text); }
  #helpBox .k { display:inline-block; padding:1px 6px; border:1px solid var(--border);
    border-radius:5px; font-size:11px; color:var(--text); background:var(--bg-soft); }
  .help-x { position:absolute; top:12px; right:12px; background:none; border:none;
    color:var(--text-muted); font-size:16px; cursor:pointer; }

  /* === МОБИЛЬНЫЕ УСТРОЙСТВА === */
  @supports (height: 100dvh) {
    .main, #canvasView { height: calc(100dvh - 190px); }
  }
  @media (max-width: 760px) {
    .header { padding: 8px 10px; gap: 8px; }
    .header img { height: 40px !important; width: 40px !important; }
    .header-text h1 { font-size: 13px; }
    .header-text p { display: none; }
    .header-right { gap: 6px; }
    .search-box { width: 100%; order: 10; }
    .btn { padding: 6px 9px; font-size: 11px; }
    .tabs { padding: 6px 10px; overflow-x: auto; flex-wrap: nowrap; top: auto; position: static; }
    .tab { flex-shrink: 0; padding: 6px 11px; }
    .stats-bar .stat { padding: 7px 12px; }
    .legend { display: none; }
    .main, #canvasView { height: auto; position: fixed; top: auto; inset: auto 0 0 0;
      top: 0; }
    .main { position: static; height: calc(100dvh - 230px); min-height: 320px; }
    #canvasView { position: relative; height: calc(100dvh - 230px); min-height: 320px; }
    .chart-area { padding: 14px; }
    .info-panel { width: 100%; top: auto; bottom: 0; max-height: 70vh;
      border-left: none; border-top: 1px solid var(--border);
      transform: translateY(100%); }
    .info-panel.open { transform: translateY(0); }
    .cv-toolbar { top: 8px; left: 8px; right: 8px; flex-wrap: wrap; justify-content: center; }
    .search-pill { top: auto; bottom: 14px; right: 12px; }
    .search-arrows { top: auto; bottom: 10px; right: 120px; }
  }
</style>
</head>
<body>
<div class="search-pill" id="searchPill"></div>
<div class="search-arrows" id="searchArrows">
  <button class="sarr" id="sarrUp" title="Попередній">▲</button>
  <span id="sarrIdx" style="font-size:11px;color:var(--text-muted);min-width:40px;text-align:center;line-height:28px;"></span>
  <button class="sarr" id="sarrDown" title="Наступний">▼</button>

-- =====================================================================
-- ГО «Проліска» — актуальні контакти (тільки аркуші 2026 року)
-- Джерела: 2026 УВКБ ООН, ГФУ 39496, ГФУ 38128, SHARP PULSE 2026, DOS 2026
-- Діалект: стандартний SQL (PostgreSQL / MySQL 8 / SQLite)
-- =====================================================================

DROP TABLE IF EXISTS vacancies;
DROP TABLE IF EXISTS assignments;
DROP TABLE IF EXISTS positions;
DROP TABLE IF EXISTS locations;
DROP TABLE IF EXISTS projects;
DROP TABLE IF EXISTS persons;

CREATE TABLE persons (
    person_id        VARCHAR(10) PRIMARY KEY,
    full_name        VARCHAR(255) NOT NULL,
    phones           VARCHAR(255),
    corporate_email  VARCHAR(255),
    personal_email   VARCHAR(255),
    projects_count   INT
);

CREATE TABLE projects (
    project_id   VARCHAR(10) PRIMARY KEY,
    sheet_name   VARCHAR(100) NOT NULL,
    project_name VARCHAR(255),
    donor        VARCHAR(100),
    year         INT,
    staff_count  INT
);

CREATE TABLE locations (
    location_id   VARCHAR(10) PRIMARY KEY,
    name          VARCHAR(255) NOT NULL,
    records_count INT
);

CREATE TABLE positions (
    position_id   VARCHAR(10) PRIMARY KEY,
    title         VARCHAR(500) NOT NULL,
    records_count INT
);

CREATE TABLE assignments (
    assignment_id   INT PRIMARY KEY,
    person_id       VARCHAR(10) NOT NULL REFERENCES persons(person_id),
    project_id      VARCHAR(10) NOT NULL REFERENCES projects(project_id),
    location_id     VARCHAR(10) REFERENCES locations(location_id),
    position_id     VARCHAR(10) REFERENCES positions(position_id),
    position_text   VARCHAR(500),
    phone           VARCHAR(50),
    corporate_email VARCHAR(255),
    personal_email  VARCHAR(255)
);

CREATE TABLE vacancies (
    vacancy_id    INT PRIMARY KEY,
    project_id    VARCHAR(10) REFERENCES projects(project_id),
    location_id   VARCHAR(10) REFERENCES locations(location_id),
    position_text VARCHAR(500)
);

/* ================================================================
   1. SQL-ПАРСЕР — читает CREATE/INSERT из тега #sqlData (или из
   загруженного файла) и строит таблицы в памяти. Понимает NULL,
   экранирование '' и точки с запятой внутри строк.
   ================================================================ */
function parseSQL(text) {
  const sql = text.replace(/^\s*--.*$/gm, ''); // комментарии только с начала строки
  const tables = {};
  const re = /INSERT\s+INTO\s+(\w+)\s*\(([^)]*)\)\s*VALUES/gi;
  let m;
  while ((m = re.exec(sql)) !== null) {
    const tname = m[1].toLowerCase();
    const cols = m[2].split(',').map(c => c.trim());
    if (!tables[tname]) tables[tname] = [];
    let i = re.lastIndex;
    // Читаем кортежи до ';' верхнего уровня
    while (i < sql.length) {
      while (i < sql.length && sql[i] !== '(' && sql[i] !== ';') i++;
      if (i >= sql.length || sql[i] === ';') break;
      i++; // пропускаем '('
      const vals = [];
      let cur = '', inStr = false, wasStr = false;
      for (; i < sql.length; i++) {
        const ch = sql[i];
        if (inStr) {
          if (ch === "'") {
            if (sql[i + 1] === "'") { cur += "'"; i++; }
            else inStr = false;
          } else cur += ch;
        } else if (ch === "'") { inStr = true; wasStr = true; }
        else if (ch === ',') { vals.push(finishVal(cur, wasStr)); cur = ''; wasStr = false; }
        else if (ch === ')') { vals.push(finishVal(cur, wasStr)); i++; break; }
        else if (!/\s/.test(ch)) cur += ch; // пробелы вне кавычек не накапливаем
      }
      const row = {};
      cols.forEach((c, idx) => row[c] = vals[idx] !== undefined ? vals[idx] : null);
      tables[tname].push(row);
      while (i < sql.length && (sql[i] === ',' || /\s/.test(sql[i]))) i++;
      if (sql[i] === ';') break;
    }
    re.lastIndex = i;
  }
  return tables;

  function finishVal(v, wasStr) {
    if (wasStr) return v;
    v = v.trim();
    if (/^NULL$/i.test(v) || v === '') return null;
    if (/^-?\d+(\.\d+)?$/.test(v)) return Number(v);
    return v;
  }
}

/* ================================================================
   2. МОДЕЛЬ ДАННЫХ

let DB = null; // { persons, projects, locations, positions, assignments, vacancies } + индексы

function buildDB(tables) {
  const personById = new Map(), projectById = new Map(),
        locationById = new Map(), positionById = new Map();
  (tables.persons || []).forEach(p => personById.set(p.person_id, p));
  (tables.projects || []).forEach(p => projectById.set(p.project_id, p));
  (tables.locations || []).forEach(l => locationById.set(l.location_id, l));
  (tables.positions || []).forEach(p => positionById.set(p.position_id, p));

  const assignments = (tables.assignments || []).map(a => {
    const person = personById.get(a.person_id) || {};
    return {
      ...a,
      personName: person.full_name || '—',
      email: a.corporate_email || person.corporate_email || a.personal_email || person.personal_email || '',
      phoneStr: a.phone || person.phones || '',
      locName: a.location_id ? (locationById.get(a.location_id)?.name || a.location_id) : null,
      cls: classifyRole(a.position_text || '')
    };
  });
  const vacancies = (tables.vacancies || []).map(v => ({
    ...v,
    locName: v.location_id ? (locationById.get(v.location_id)?.name || v.location_id) : null
  }));
  const byPerson = new Map();
  assignments.forEach(a => {
    if (!byPerson.has(a.person_id)) byPerson.set(a.person_id, []);
    byPerson.get(a.person_id).push(a);
  });
  // Организационный уровень: глава и заместители (для fallback-режима без таблицы финансирования)
  const head = assignments.find(a => a.cls.rank === 0) || null;
  const deputies = assignments.filter(a => a.cls.rank === 1);
  const org = { head, deputies, basePid: head ? head.project_id : null };

  // Таблица финансирования (столбец E исходного Excel): person_id → проекты,
  // из которых человек финансируется. Если она есть в SQL — привязка к проектам
  // идёт СТРОГО по ней (важно для аудита).
  const fundingRows = tables.person_project_funding || tables.funding || [];
  const fundingByPerson = new Map(), fundingByProject = new Map();
  fundingRows.forEach(r => {
    if (!r.person_id || !r.project_id) return;
    if (!fundingByPerson.has(r.person_id)) fundingByPerson.set(r.person_id, new Set());
    fundingByPerson.get(r.person_id).add(r.project_id);
    if (!fundingByProject.has(r.project_id)) fundingByProject.set(r.project_id, new Set());
    fundingByProject.get(r.project_id).add(r.person_id);
  });
  const hasFunding = fundingRows.length > 0;

  return { personById, projectById, locationById, positionById, assignments, vacancies, byPerson,
           projects: tables.projects || [], org, hasFunding, fundingByPerson, fundingByProject };
}

const PROJECT_COLORS = ['#4f8ef7', '#00d4ff', '#9b72f6', '#f5a623', '#22c97a', '#ff8c42'];
function projColor(pid) {
  const idx = DB.projects.findIndex(p => p.project_id === pid);
  return PROJECT_COLORS[(idx >= 0 ? idx : 0) % PROJECT_COLORS.length];
}

/* ================================================================
   3. ПОСТРОЕНИЕ ДЕРЕВА ДЛЯ ВЫБРАННОЙ ВКЛАДКИ
   view: 'all' | project_id | 'vac'
   ================================================================ */
function personNode(a) {
  const viewPid = a.__funded ? a.__pid : a.project_id;
  let tags = [DB.projectById.get(viewPid)?.sheet_name?.trim() || viewPid];
  if (a.locName && !/головний офіс/i.test(a.locName)) tags.push(a.locName);
  if (a.__projects && a.__projects.length > 1) tags = a.__projects.slice();
  else if (a.__funded) tags.push('лист: ' + (DB.projectById.get(a.project_id)?.sheet_name?.trim() || a.project_id));
  return {
    id: (a.__funded ? 'f-' + a.__pid + '-' : 'a') + a.assignment_id,
    kind: 'person',
    personId: a.person_id,
    name: a.personName,
    role: a.position_text || '',
    email: a.email, phone: a.phoneStr,
    type: a.cls.type, color: a.cls.color,
    tags,
    children: []
  };
}
function vacancyNode(v) {
  return {
    id: 'v' + v.vacancy_id,
    kind: 'vac',
    name: 'Вакансія',
    role: (v.position_text || '').replace(/^Вакансія\s*\/\s*/i, ''),
    type: 'position', color: '#ff4f4f',
    tags: [DB.projectById.get(v.project_id)?.sheet_name || ''].concat(v.locName && !/головний офіс/i.test(v.locName) ? [v.locName] : []),
    children: []
  };
}

    x.cls.rank - y.cls.rank ||
    (isLocHead(y) ? 1 : 0) - (isLocHead(x) ? 1 : 0) ||
    x.personName.localeCompare(y.personName, 'uk'));
}

/* Блок «Головний офіс» проєкту: центральні відділи та НЕзаповнені
   центральні позиції (вакансії) — всередині; польові офіси — окремо нижче. */
/* Адреси офісів (відображаються під назвою локації / блоку) */
const LOC_ADDRESS = {
  'Дніпро': 'вул. Мандриківська, 47 (юридична) / Набережна Перемоги, 40а',
  'Харків': 'пров. Петрівський, 1',
  'Конотоп': 'проспект Миру, 15, кв. 63'
};
/* Статуси офісів (наприклад, офіс у процесі відкриття) */
const LOC_STATUS = {
  'Чернігів': 'відкривається — триває підбір персоналу та оренда офісу'
};
/* Іменування блоку центральних відділів для окремих проєктів */
const HQ_INFO = { name: 'Головний офіс — Закарпатська область',
                  role: 'с. Сторожниця, вул. Ужгородська, 43' };
/* Вузол головного офісу: стоїть НАД усім центральним персоналом проєкту,
   від нього далі розходиться дерево (регіональні офіси — нижче). */
/* Спільні позиції: один PM на обидва проєкти ГФУ (39496 + 38128) */
const SHARED_PM_PROJECTS = ['PR02', 'PR03'];
const sharedPmLabel = () => SHARED_PM_PROJECTS

const isHqLoc = lid => !lid || /головний офіс/i.test(DB.locationById.get(lid)?.name || '');

function makeHqNode(pid, kids) {
  let people = 0, vacs = 0;
  kids.forEach(k => (function c(n){ if(n.kind==='person')people++; if(n.kind==='vac')vacs++; (n.children||[]).forEach(c); })(k));

    children: kids
  };
}

function makeHqBlock(pid, kids) {
  if (!kids.length) return [];
  let people = 0, vacs = 0;
  kids.forEach(k => (function c(n){ if(n.kind==='person')people++; if(n.kind==='vac')vacs++; (n.children||[]).forEach(c); })(k));
  return [{
    id: 'hq-' + pid, kind: 'group',
    name: (HQ_BLOCK_INFO[pid]?.name) || 'Центральні відділи',

    type: 'group', color: '#4f8ef7',
    tags: [people + ' осіб'].concat(vacs ? [vacs + ' вак.'] : []),
    children: kids
  }];
}

/* Head of program — рівень між Заступником та PM'ами/відділами (як у PDF).
   Посада наразі відкрита, але відображається звичайною карткою без слова «вакансія». */
function headOfProgramNode() {

    id: 'hop-' + v.vacancy_id, kind: 'group',

  };
}

/* Карточка организационного уровня (глава / заступник) — fallback без таблицы финансирования */
function orgPersonNode(a) {
  const n = personNode(a);
  n.tags = ['Вся організація'];
  return n;
}

/* Организационные департаменты — общие службы организации: в иерархии
   стоят на одном уровне с менеджерами проектов (под Заступником Голови),
   как в старой органограмме. Внутри департамента люди разных проектов —
   на одной иерархической позиции, не подчиняются друг другу. */
const ORG_DEPT_GROUPS = new Set(['Фінанси', 'Закупівлі', 'Склад та логістика', 'HR',
  'Комунікації', 'Гаряча лінія', 'IT та управління даними', 'Безпека',
  'Юридична підтримка', 'Консультанти', 'MEAL / Моніторинг та оцінка',
  'Супервізія психологів', 'Управління інформацією', 'IT-підтримка']);
/* Відділи, керівники яких стоять ПАРАЛЕЛЬНО (не підпорядковуються один одному),
   персонал — під останнім (Фінанси: Senior Finance Officer | Head of Finance) */
const PARALLEL_LEAD_GROUPS = new Set(['Фінанси']);
/* Групи, що зводяться разом лише на загальній схемі (у вкладках лишаються у своїх проєктах) */
const MERGE_ONLY_GROUPS = new Set(['Транспорт']);
const MERGE_GROUPS = new Set([...ORG_DEPT_GROUPS, ...MERGE_ONLY_GROUPS]);
/* Именные главы департаментов (при необходимости: { 'Группа': /Прізвище/ }) */
const DEPT_HEAD_OVERRIDE = {};

/* Сборка узлов департаментов из groups(Map) — общая для проектных
   и организационного (merged) уровней. */
function buildDeptEntries(groups, idPrefix) {
  return [...groups.entries()]
    .sort((x, y) => y[1].length - x[1].length)
    .map(([g, arr]) => {
      let gLeads = arr.filter(a => a.cls.rank === 3);
      let gStaff = arr.filter(a => a.cls.rank !== 3);
      const ovRe = DEPT_HEAD_OVERRIDE[g];
      if (ovRe) {
        const ovA = arr.find(a => ovRe.test(a.personName));
        if (ovA) {
          gLeads = [ovA].concat(gLeads.filter(a => a !== ovA));
          gStaff = gStaff.filter(a => a !== ovA);
        }
      }
      // «senior» выше остальных лидов того же ранга (Andriichuk → Head of finance)
      if (!ovRe) gLeads.sort((x, y) =>
        (/senior|старший/i.test(y.position_text || '') ? 1 : 0) -
        (/senior|старший/i.test(x.position_text || '') ? 1 : 0) ||
        x.personName.localeCompare(y.personName, 'uk'));
      if (gLeads.length === 1 && gStaff.length === 0) {
        const solo = personNode(gLeads[0]);
        solo.tags = [g].concat(solo.tags);
        solo.noStack = true; // керівник напрямку — на лінії відділів, не в стовпчику
        return { g, nodes: [solo] };
      }
      if (PARALLEL_LEAD_GROUPS.has(g) && gLeads.length > 1) {
        const leadNodes = gLeads.map(a => { const n = personNode(a); n.tags = [g].concat(n.tags); n.noStack = true; return n; });
        const last = leadNodes[leadNodes.length - 1];
        last.children = last.children.concat(
          packSameRole(sortByFunction(gStaff).map(a => { const n = personNode(a); n.noStack = true; return n; }), idPrefix + '-' + slug(g)));
        return { g, nodes: leadNodes };
      }
      const hasSenior = gLeads.some(a => /senior|старший/i.test(a.position_text || ''));
      if (gLeads.length > 1 && gStaff.length === 0 && !ovRe && !hasSenior) {
        // равноуровневые (напр., Associate PM) — паралельно, НЕ підпорядковуються один одному
        return { g, nodes: [{
          id: 'g-' + idPrefix + '-' + slug(g), kind: 'group',
          name: g, role: 'центральна команда',
          type: 'group', color: arr[0].cls.color,
          tags: [arr.length + ' осіб'],
          children: gLeads.map(personNode)
        }] };
      }
      if (gLeads.length) {
        // цепочка руководителей: Senior → Head → персонал под последним
        const top = personNode(gLeads[0]);
        top.tags = [g].concat(top.tags); // название отдела — первым бейджем
        let cur = top;
        gLeads.slice(1).forEach(a => { const n = personNode(a); cur.children.push(n); cur = n; });
        cur.children = cur.children.concat(
          packSameRole(sortByFunction(gStaff).map(a => { const n = personNode(a); n.noStack = true; return n; }), idPrefix + '-' + slug(g)));
        return { g, nodes: [top] };
      }
      return { g, nodes: [{
        id: 'g-' + idPrefix + '-' + slug(g), kind: 'group',
        name: g, role: 'центральна команда',
        type: 'group', color: arr[0].cls.color,
        tags: [arr.length + ' осіб'],
        children: packSameRole(sortByFunction(arr).map(a => { const n = personNode(a); n.noStack = true; return n; }), idPrefix + '-' + slug(g))
      }] };
    });
}

/* ИЕРАРХИЯ ВНУТРИ РЕГИОНАЛЬНОГО ОФИСА — как в старой органограмме:
   начальник центра сверху, под ним профильные звенья со своими лидами:
   Senior psychologist → психологи; Case management coordinator → кейс-воркери;
   Data manager → reporting-асистенти; завідувач складу → outreach (дистрибуція).
   Люди без звена (field workers, водії, shelter, безпека) — прямо під начальником. */
const LOC_TEAMS = [
  { groups: ['Психологи / MHPSS'],
    lead: /senior psychologist|головний психолог|супервізор/i },
  { groups: ['Соціальний супровід', 'Захист у громадах (CBP)'],
    lead: /coordinator|координатор|регіональний керівник/i },
  { groups: ['IT та управління даними'],
    lead: /data manager/i },
  // Outreach worker'и (дистрибуція) — під завскладом / логістом, як у старій органограмі
  { groups: ['Склад та логістика'],
    lead: /завідувач складу|logistics|логіст/i,
    also: a => /дистрибуці|outreach/i.test(a.position_text || '') }
];
/* 1) Єдиний порядок читання: дані → психологи → кейс-менеджмент →
      польова робота → shelter → CBP → склад → транспорт → інше */
const GROUP_ORDER = ['IT та управління даними', 'Психологи / MHPSS', 'Соціальний супровід',
  'Соціальні фасилітатори', 'Польова робота', 'Shelter / екстрене реагування',
  'Захист у громадах (CBP)', 'Склад та логістика', 'Транспорт', 'Безпека', 'Інше'];
const groupRank = g => { const i = GROUP_ORDER.indexOf(g); return i < 0 ? GROUP_ORDER.length : i; };
function sortByFunction(list) {
  return list.slice().sort((x, y) =>
    groupRank(x.cls.group) - groupRank(y.cls.group) ||
    x.cls.rank - y.cls.rank ||
    x.personName.localeCompare(y.personName, 'uk'));
}

/* 2) Однотипні позиції — компактним боксом «N позицій» (як у старому PDF).
      Розгортається кліком: усередині — персональні картки. */
/* Відомі одруківки листа → канонічна назва (дані не змінюються) */
const ROLE_FIX = [
  [/prokurement/i, 'Procurement'],
  [/field assistan(?!t)/i, 'Field Assistant'],
  [/facilittators/i, 'Facilitators']
];
const fixRole = t => ROLE_FIX.reduce((s, [re, to]) => s.replace(re, to), t || '');
const ROLE_KEY = t => fixRole(t || '').split('/')[0].trim().toLowerCase()
  .replace(/\s*\(.*?\)\s*/g, '').replace(/\s+/g, ' ');
const COLLAPSE_MIN = 3; // від 3 однакових посад — згортати в бокс

/* Б) порядок вакансій: керівні → спеціалісти → підтримка */
const VAC_PRIORITY = [
  /project manager|head of|senior|area officer|coordinator|manager/i,   // 0 — керівні
  /officer|specialist|спеціаліст|фахівець/i,                            // 1 — спеціалісти
  /assistant|operator|driver|водій|logistic|склад|перевезення/i          // 2 — підтримка
];
const vacRank = t => {
  const i = VAC_PRIORITY.findIndex(re => re.test(t || ''));
  return i < 0 ? VAC_PRIORITY.length : i;
};
const sortVacs = list => list.slice().sort((x, y) =>
  vacRank(x.position_text || x.role) - vacRank(y.position_text || y.role) ||
  String(x.position_text || x.role).localeCompare(String(y.position_text || y.role), 'uk'));
function packSameRole(nodes, idPrefix) {
  const byRole = new Map();
  nodes.forEach(n => {
    const key = ROLE_KEY(n.role) + '|' + n.kind;
    if (!byRole.has(key)) byRole.set(key, []);
    byRole.get(key).push(n);
  });
  const out = [];
  [...byRole.entries()].forEach(([key, arr]) => {
    if (arr.length < COLLAPSE_MIN) { out.push(...arr); return; }
    const roleTitle = fixRole(arr[0].role || '').split('/')[0].trim();
    const isVac = arr[0].kind === 'vac';
    out.push({
      id: 'pack-' + idPrefix + '-' + slug(key),
      kind: 'pack',
      name: roleTitle || 'Позиції',
      role: arr.length + (isVac ? ' вакансій' : ' позицій'),
      type: isVac ? 'position' : 'group',
      color: isVac ? '#ff4f4f' : (arr[0].color || '#22c97a'),
      tags: [arr.length + (isVac ? ' вак.' : ' осіб')],
      noStack: true,
      children: arr
    });
  });
  return out;
}

function buildLocationTeams(members, locVacs, idPrefix) {
  const used = new Set();
  const teamNodes = [];
  LOC_TEAMS.forEach(def => {
    const team = members.filter(a =>
      !used.has(a.assignment_id) &&
      (def.groups.includes(a.cls.group) || (def.also && def.also(a))));
    if (!team.length) return;
    const leads = team.filter(a => def.lead.test(a.position_text || ''));
    if (!leads.length) return; // без лида звено остаётся плоским под начальником
    team.forEach(a => used.add(a.assignment_id));
    const leadNode = personNode(leads[0]);
    leadNode.children = packSameRole(
      sortByFunction(team.filter(a => a !== leads[0])).map(a => { const n = personNode(a); n.noStack = true; return n; }),
      idPrefix + '-t');
    teamNodes.push(leadNode);
  });
  // решта персоналу офісу — паралельно, на одній лінії з керівниками ланок
  const rest = sortByFunction(members.filter(a => !used.has(a.assignment_id)));
  const restNodes = packSameRole(rest.map(a => { const n = personNode(a); n.noStack = true; return n; }), idPrefix);
  const vacNodes = packSameRole((locVacs || []).map(v => { const n = vacancyNode(v); n.noStack = true; return n; }), idPrefix + '-v');
  return teamNodes.concat(restNodes, vacNodes);
}

/* СОСТАВ ПРОЕКТА.
   Если в SQL есть person_project_funding — строго по финансированию:
   - строка листа попадает в проект, только если человек финансируется из него;
   - человек, финансируемый из проекта, но записанный на другом листе,
     добавляется с должностью/локацией из его основной строки (помечен __funded).
   Люди, отсутствующие в таблице финансирования, остаются по листу (fallback). */
function effectiveAssignments(pid) {
  const own = DB.assignments.filter(a => a.project_id === pid);
  if (!DB.hasFunding) return own;
  // рядок листа — завжди факт присутності у проєкті;
  // таблиця фінансування лише ДОДАЄ кост-шеринговий персонал
  const result = own.slice();
  const included = new Set(own.map(a => a.person_id));
  (DB.fundingByProject.get(pid) || new Set()).forEach(personId => {
    if (included.has(personId)) return;
    const base = (DB.byPerson.get(personId) || [])
      .slice().sort((x, y) => x.cls.rank - y.cls.rank)[0];
    if (base) { result.push({ ...base, __funded: true, __pid: pid }); included.add(personId); }
  });
  return result;
}

function buildProjectTree(pid, opts = {}) {
  const excl = opts.exclude || new Set();
  const proj = DB.projectById.get(pid);
  const color = projColor(pid);
  const as = effectiveAssignments(pid).filter(a => !excl.has(a.assignment_id));
  const exclVac = opts.excludeVac || new Set();
  const vsAll = DB.vacancies.filter(v => v.project_id === pid);
  const isSecVac = v => /security officer/i.test(v.position_text || '');
  const isHopVac = v => /head of program/i.test(v.position_text || '');
  const secVacs = vsAll.filter(v => isSecVac(v) && isHqLoc(v.location_id) && !exclVac.has(v.vacancy_id));
  // якщо у проєкту немає PM-людини — вакансія Project Manager стає стволом блоку
  const pmVacObj = !as.some(a => a.cls.rank <= 2)
    ? vsAll.find(v => /project manager/i.test(v.position_text || '') && !v.location_id &&
                      !isSecVac(v) && !exclVac.has(v.vacancy_id)) || null
    : null;
  const vs = vsAll.filter(v => !(isSecVac(v) && isHqLoc(v.location_id)) && !isHopVac(v) && v !== pmVacObj && !exclVac.has(v.vacancy_id));

  const root = {
    id: 'proj-' + pid, kind: 'proj',
    name: proj?.project_name || pid,
    role: (proj?.donor || '') + ' · ' + (proj?.year || ''),
    type: 'proj', color,
    tags: [new Set(as.map(a => a.person_id)).size + ' осіб', vsAll.filter(v => !exclVac.has(v.vacancy_id)).length + ' вакансій'],
    children: []
  };

  // — вершина проекта: ЦЕПОЧКА руководителей по рангам, как в старой органограмме:
  //   Голова → Заступник → PM (отделы під ним) + Field Manager (Fields під ним) —
  const leadersAll = sortPeople(as.filter(a => a.cls.rank <= 2).slice());
  const leadersSet = new Set(leadersAll.map(a => a.assignment_id));
  const others = as.filter(a => !leadersSet.has(a.assignment_id));

  // Security-офицеры любых локаций уходят в отдел «Безпека» на орг-линии
  const secAs = others.filter(a => a.cls.group === 'Безпека' && isHqLoc(a.location_id));
  const othersNoSec = others.filter(a => !(a.cls.group === 'Безпека' && isHqLoc(a.location_id)));

  // — центральный офис (location NULL) —
  const hqAll = sortPeople(othersNoSec.filter(a => isHqLoc(a.location_id)).slice());
  // кост-шерингові служби організації (фінансуються з проєкту, рядки — на базовому листі)
  const isFundedOrg = a => a.__funded && ORG_DEPT_GROUPS.has(a.cls.group);
  const fundedOrg = hqAll.filter(isFundedOrg);
  const rest = hqAll.filter(a => !isFundedOrg(a));

  // группируем сотрудников центра по направлениям;
  // если у направления есть керівник (rank 3) — отдел строится ПОД ним,
  // как в старій органограмі (Kovalenko → закупівлі, Head of finance → бухгалтери)
  const groups = new Map();
  rest.forEach(a => {
    const g = a.cls.group;
    if (!groups.has(g)) groups.set(g, []);
    groups.get(g).push(a);
  });
  const deptEntries = buildDeptEntries(groups, pid);
  // организационные департаменты — на уровне заступника, параллельно PM'ам проектов
  const orgDeptNodes = deptEntries.filter(e => ORG_DEPT_GROUPS.has(e.g)).flatMap(e => e.nodes);
  const progDeptNodes = deptEntries.filter(e => !ORG_DEPT_GROUPS.has(e.g)).flatMap(e => e.nodes);
  // Security department: офицеры безопасности из ЛЮБЫХ локаций + вакансии безпеки —
  // единый отдел на линии глав отделов (по уточнению: Дніпро + вакансія Харків)
  if (secAs.length || secVacs.length) {
    orgDeptNodes.push({
      id: 'g-' + pid + '-security-dept', kind: 'group',
      name: 'Безпека', role: 'центральна команда',
      type: 'group', color: '#ff8c42',
      tags: [(secAs.length + secVacs.length) + ' поз.'],
      children: sortPeople(secAs.slice()).map(personNode).concat(secVacs.map(vacancyNode))
    });
  }
  const groupNodes = progDeptNodes;

  // — локации: объединение локаций сотрудников И вакансий,
  //   чтобы вакансия в локации без штата не терялась —
  const locIds = [...new Set(
    othersNoSec.filter(a => a.location_id && !isHqLoc(a.location_id)).map(a => a.location_id)
      .concat(vs.filter(v => v.location_id && !isHqLoc(v.location_id)).map(v => v.location_id))
  )];
  locIds.sort((x, y) =>
    othersNoSec.filter(a => a.location_id === y).length - othersNoSec.filter(a => a.location_id === x).length);
  const locNodes = locIds.map(lid => {
    const people = sortPeople(othersNoSec.filter(a => a.location_id === lid).slice());
    
    const locVacsRaw = vs.filter(v => v.location_id === lid);
    const loc = DB.locationById.get(lid);
    // начальник офиса — вершина; направления (психологи, FA, кейс-менеджери, водії) — параллельно под ним
    const headIdx = people.findIndex(a => isLocHead(a));
    const head = headIdx >= 0 ? people[headIdx] : null;
    const headVac = !head ? locVacsRaw.find(v => isLocHeadVac(v)) : null;
    const staff = head ? people.filter(a => a !== head) : people;
    const restVacs = locVacsRaw.filter(v => v !== headVac);
    const teamStruct = buildLocationTeams(staff, restVacs, pid + '-' + lid);
    let kids;
    if (head || headVac) {
      const hn = head ? personNode(head) : vacancyNode(headVac);
      hn.chain = true;
      hn.children = (hn.children || []).concat(teamStruct);
      kids = [hn];
    } else {
      kids = teamStruct;
    }
    return {
      id: 'loc-' + pid + '-' + lid, kind: 'loc',
      name: /головний офіс/i.test(loc?.name || '')
        ? (loc?.name || lid)
        : 'Регіональний офіс ' + (loc?.name || lid),
      role: LOC_STATUS[loc?.name] || LOC_ADDRESS[loc?.name] || 'локація',
      type: 'loc', color: '#22c97a',
      tags: [people.length + ' осіб'].concat(locVacsRaw.length ? [locVacsRaw.length + ' вак.'] : []),
      children: kids
    };
  });

  // — вакансии центра: как в PDF — внутри своих отделов;
  //   позиции без отдела — отдельными боксами на линии ствола («кого нанять») —
  let vacGroup = [];
  vs.filter(v => isHqLoc(v.location_id)).forEach(v => {
    const g = classifyRole(v.position_text || '').group;
    const ent = deptEntries.find(e => e.g === g);
    if (!ent) { vacGroup.push(vacancyNode(v)); return; }
    const target = ent.nodes[ent.nodes.length - 1];
    const isSeniorVac = /senior|головний|старший/i.test(v.position_text || '');
    if (isSeniorVac && target.kind === 'group') {
      const vn = vacancyNode(v);
      const kids = target.children;
      Object.assign(target, {
        id: vn.id, kind: 'vac', name: vn.name, role: vn.role,
        type: 'position', color: '#ff4f4f',
        tags: [g].concat(vn.tags), children: kids
      });
      return;
    }
    target.children.push(vacancyNode(v));
  });
  // А) усі центральні вакансії проєкту — одним боксом (розкривається кліком),
  //    усередині — за пріоритетом: керівні → спеціалісти → підтримка
  vacGroup = sortVacs(vacGroup).map(n => { n.noStack = true; return n; });
  if (vacGroup.length >= COLLAPSE_MIN) {
    vacGroup = [{
      id: 'pack-' + pid + '-hqvac', kind: 'pack',
      name: 'Вакансії головного офісу', role: vacGroup.length + ' позицій',
      type: 'position', color: '#ff4f4f', noStack: true,
      tags: [vacGroup.length + ' вак.'],
      children: vacGroup
    }];
  }
  deptEntries.forEach(e => e.nodes.forEach(nd => {
    const vacs = (nd.children || []).filter(c => c.kind === 'vac');
    if (vacs.length >= COLLAPSE_MIN) {
      nd.children = (nd.children || []).filter(c => c.kind !== 'vac')
        .concat(packSameRole(vacs, pid + '-dv-' + slug(e.g)));
    }
  }));

  // локации собираются под узлом «Fields», як у старій органограмі
  const fieldBranch = locNodes.length >= 3 ? [{
    id: 'fields-' + pid, kind: 'fields',
    name: 'Регіональні офіси', role: 'мережа офісів проєкту',
    type: 'loc', color: '#22c97a',
    tags: [locNodes.length + ' локацій'],
    children: locNodes
  }] : locNodes;

  let children;
  const liftOrg = (pid === DB.org.basePid);
  let orgPending = liftOrg ? orgDeptNodes : [];      // служби базового листа — на лінію заступника
  const localOrgDepts = liftOrg ? [] : orgDeptNodes; // служби інших проєктів — усередині блоку проєкту
  if (fundedOrg.length) {
    // фінансовані з проєкту орг-позиції — ОКРЕМИМИ картками на одній лінії
    // після Head of program (нарівні з керівником проєкту), без вкладень
    sortPeople(fundedOrg.slice()).forEach(a => {
      const n = personNode(a);
      n.tags = [a.cls.group].concat(n.tags);
      n.noStack = true; // на полотні — горизонтально, не стовпчиком
      orgPending.push(n);
    });
  }
  if (leadersAll.length) {
    const nodes = leadersAll.map(a => { const n = personNode(a); n.chain = true; n._role = a.position_text || ''; return n; });
    const byRank = new Map();
    leadersAll.forEach((a, i) => {
      if (!byRank.has(a.cls.rank)) byRank.set(a.cls.rank, []);
      byRank.get(a.cls.rank).push(nodes[i]);
    });
    const ranks = [...byRank.keys()].sort((a, b) => a - b);
    // цепочка: каждый следующий ранг — под первым лидером предыдущего
    for (let i = 0; i < ranks.length - 1; i++)
      byRank.get(ranks[i])[0].children = byRank.get(ranks[i])[0].children.concat(byRank.get(ranks[i + 1]));
    const lastSet = byRank.get(ranks[ranks.length - 1]);
    // PM проєкту — вершина програмного блоку; Field Manager — ПІД PM,
    // а всі регіональні офіси (Fields) — під Field Manager'ом:
    // Мігоцький → Небеська → Fields, точно як у PDF
    const pmNode = lastSet.find(n => /project manager|менеджер проєкту|project coordinator/i.test(n._role)) || lastSet[0];
    const fmNode = lastSet.find(n => n !== pmNode && /field manager|помічник голови/i.test(n._role)) || null;
    if (fmNode) {
      if (ranks.length >= 2) {
        const parentOfPMs = byRank.get(ranks[ranks.length - 2])[0];
        parentOfPMs.children = parentOfPMs.children.filter(n => n !== fmNode);
      }
      pmNode.children.push(fmNode);
    }
    if (liftOrg) {
      // базовий лист (УВКБ): програмні напрямки прямо під PM, Fields — під Field Manager'ом
      const fieldsHolder = fmNode || pmNode;
      pmNode.children = pmNode.children.concat(groupNodes, localOrgDepts, vacGroup);
      fieldsHolder.children = fieldsHolder.children.concat(fieldBranch);
    } else {
      // програмні напрямки та вакансії — під PM; регіональні офіси — нижче
      pmNode.children = pmNode.children.concat(groupNodes, localOrgDepts, vacGroup, fieldBranch);
    }
    // организационные департаменты — параллельно PM'ам: детьми прямого родителя PM-уровня
    if (ranks.length >= 2) {
      const apex = byRank.get(ranks[ranks.length - 2])[0];
      apex.children = apex.children.concat(orgPending);
      orgPending = [];
      // Head of program — між Заступником і рівнем PM/відділів
      if (ranks[ranks.length - 2] <= 1) {
        const hop = headOfProgramNode();
        if (hop) { hop.children = apex.children; apex.children = [hop]; }
      }
    }
    children = byRank.get(ranks[0]);
    if (ranks.length === 1 && fmNode) children = children.filter(n => n !== fmNode);
  } else {
    // PM-людини немає: стволом стає ВАКАНСІЯ Project Manager,
    // під нею — асистенти PM паралельно, далі на одній лінії:
    // відділи головного офісу проєкту та регіональні офіси (як у PDF)
    const uprIdx = groupNodes.findIndex(n => n.name === 'Управління проєктом');
    const apmCards = uprIdx >= 0 ? groupNodes[uprIdx].children : [];
    apmCards.forEach(n => { n.noStack = true; }); // управлінський рівень — горизонтально, без стопки
    const otherProg = groupNodes.filter((_, i) => i !== uprIdx);
    const row = otherProg.concat(localOrgDepts, vacGroup, fieldBranch);
    if (pmVacObj) {
      const pmTrunk = vacancyNode(pmVacObj);
      pmTrunk.chain = true;
      if (SHARED_PM_PROJECTS.includes(pid) && /project manager/i.test(pmVacObj.position_text || '')) {
        // один менеджер проєкту на обидва гранти ГФУ
        pmTrunk.id = 'v-shared-pm';
        pmTrunk.role = 'Project Manager / Менеджер проєкту (спільний для двох проєктів ГФУ)';
        pmTrunk.tags = [sharedPmLabel()];
      }
      pmTrunk.children = apmCards.concat(row);
      children = [pmTrunk];
    } else if (apmCards.length) {
      const upr = groupNodes[uprIdx];
      upr.children = upr.children.concat(row);
      children = [upr];
    } else {
      children = row;
    }
  }

  // Fallback без таблицы финансирования: глава/заступник — организационный
  // уровень поверх каждого проекта. При наличии person_project_funding
  // не используется — состав определяют данные.
  if (opts.injectOrg && DB.org.head &&
      !as.some(a => a.assignment_id === DB.org.head.assignment_id)) {
    const headNode = orgPersonNode(DB.org.head);
    headNode.chain = true;
    const depNodes = DB.org.deputies
      .filter(d => !as.some(a => a.assignment_id === d.assignment_id))
      .map(orgPersonNode);
    depNodes.forEach(d => d.chain = true);
    if (depNodes.length) {
      // Голова → Заступник → Head of program → дерево проєкту
      const hop = headOfProgramNode();
      if (hop) {
        hop.children = children.concat(orgPending);
        depNodes[0].children = depNodes[0].children.concat([hop]);
      } else {
        depNodes[0].children = depNodes[0].children.concat(children, orgPending);
      }
      orgPending = [];
      headNode.children = depNodes;
    } else {
      headNode.children = children.concat(orgPending);
      orgPending = [];
    }
    children = [headNode];
  }
  // ГОЛОВНИЙ ОФІС — над главою організації (на всіх вкладках)
  if (children.length && children[0].kind === 'person' && children[0].chain)
    children = [makeHqNode(pid, children)];
  if (orgPending.length) children = children.concat(orgPending); // верхний уровень, если заступника нет
  root.children = children;
  return root;
}

function buildVacancyTree() {
  const root = {
    id: 'vac-root', kind: 'org',
    name: 'Відкриті вакансії', role: 'по всіх проєктах',
    type: 'org', color: '#ff4f4f',
    tags: [DB.vacancies.length + ' вакансій'], children: []
  };
  DB.projects.forEach(p => {
    const vs = DB.vacancies.filter(v => v.project_id === p.project_id);
    if (!vs.length) return;
    const byLoc = new Map();
    vs.forEach(v => {
      const key = v.location_id || '__hq';
      if (!byLoc.has(key)) byLoc.set(key, []);
      byLoc.get(key).push(v);
    });
    const projNode = {
      id: 'vac-' + p.project_id, kind: 'proj',
      name: p.project_name, role: p.donor,
      type: 'proj', color: projColor(p.project_id),
      tags: [vs.length + ' вак.'],
      children: [...byLoc.entries()].map(([key, arr]) => ({
        id: 'vacloc-' + p.project_id + '-' + key, kind: 'loc',
        name: key === '__hq' ? 'Центральний офіс' : (DB.locationById.get(key)?.name || key),
        role: '', type: 'loc', color: '#ff4f4f',
        tags: [arr.length + ' вак.'],
        children: arr.map(vacancyNode)
      }))
    };
    root.children.push(projNode);
  });
  return root;
}

function buildTree(view) {
  if (view === 'vac') return buildVacancyTree();
  if (view !== 'all') return buildProjectTree(view, { injectOrg: true });
  // 'all' — вся организация: Глава → заступники → проєкти
  const head = DB.org.head;
  const root = {
    id: 'org-root', kind: 'org',
    name: 'ГО «Проліска»',
    role: 'Гуманітарна місія · ' + DB.projects.length + ' проєктів',
    type: 'org', color: '#4f8ef7',
    tags: [new Set(DB.assignments.map(a => a.person_id)).size + ' осіб',
           DB.vacancies.length + ' вакансій'],
    children: []
  };
  if (head) {
    // ОРГАНІЗАЦІЙНІ ДЕПАРТАМЕНТИ (як у старому PDF): зведені по ВСІХ проєктах —
    // hotline-оператори усіх грантів в одному відділі, фінанси разом тощо;
    // кожна картка зберігає тег свого проєкту (UHF / UNHCR ...).
    const orgAs = DB.assignments.filter(a =>
      isHqLoc(a.location_id) && a.cls.rank > 1 &&
      MERGE_GROUPS.has(a.cls.group) && a.cls.group !== 'Безпека');
    const secAsAll = DB.assignments.filter(a => a.cls.group === 'Безпека' && isHqLoc(a.location_id));
    const secVacsAll = DB.vacancies.filter(v =>
      /security officer/i.test(v.position_text || '') && isHqLoc(v.location_id));
    // одна людина — одна картка (кілька грантів → кілька бейджів)
    const byPersonRole = new Map();
    orgAs.forEach(a => {
      const key = a.person_id + '|' + ROLE_KEY(a.position_text);
      if (!byPersonRole.has(key)) byPersonRole.set(key, { ...a, __projects: [] });
      byPersonRole.get(key).__projects.push(
        (DB.projectById.get(a.project_id)?.sheet_name || a.project_id).trim());
    });
    const mgroups = new Map();
    [...byPersonRole.values()].forEach(a => {
      if (!mgroups.has(a.cls.group)) mgroups.set(a.cls.group, []);
      mgroups.get(a.cls.group).push(a);
    });
    // центральні вакансії відділів усіх проєктів — теж у спільні відділи
    const orgVacs = DB.vacancies.filter(v =>
      isHqLoc(v.location_id) && !/security officer|project manager|head of program/i.test(v.position_text || '') &&
      MERGE_GROUPS.has(classifyRole(v.position_text || '').group));
    const mergedEntries = buildDeptEntries(mgroups, 'org');
    orgVacs.forEach(v => {
      const g = classifyRole(v.position_text || '').group;
      const ent = mergedEntries.find(e => e.g === g);
      if (!ent) return;
      const target = ent.nodes[ent.nodes.length - 1];
      const isSeniorVac = /senior|головний|старший/i.test(v.position_text || '');
      if (isSeniorVac && target.kind === 'group') {
        const vn = vacancyNode(v);
        const kids = target.children;
        Object.assign(target, { id: vn.id, kind: 'vac', name: vn.name, role: vn.role,
          type: 'position', color: '#ff4f4f', tags: [g].concat(vn.tags), children: kids });
      } else target.children.push(vacancyNode(v));
    });
    // однакові вакансії всередині спільних відділів — компактним боксом
    mergedEntries.forEach(e => e.nodes.forEach(nd => {
      const vacs = (nd.children || []).filter(c => c.kind === 'vac');
      if (vacs.length >= COLLAPSE_MIN) {
        nd.children = (nd.children || []).filter(c => c.kind !== 'vac')
          .concat(packSameRole(vacs, 'org-dv-' + slug(e.g)));
      }
    }));
    let mergedDepts = mergedEntries.flatMap(e => e.nodes);

    /* A) Кластери служб (у дусі старого PDF, але на живих даних) */
    const CLUSTERS = [
      { name: 'Фінанси та закупівлі', color: '#f5a623',
        groups: ['Фінанси', 'Закупівлі'] },
      { name: 'Операційна підтримка', color: '#4f8ef7',
        groups: ['HR', 'IT-підтримка', 'IT та управління даними', 'Управління інформацією',
                 'Склад та логістика', 'Транспорт', 'Безпека', 'Юридична підтримка'] },
      { name: 'Програмна якість', color: '#9b72f6',
        groups: ['MEAL / Моніторинг та оцінка', 'Комунікації', 'Гаряча лінія', 'Супервізія психологів'] }
    ];
    const groupOfNode = nd => {
      const e = mergedEntries.find(x => x.nodes.includes(nd));
      if (e) return e.g;
      if (nd.name === 'Безпека') return 'Безпека';       // окремо зібраний відділ
      if (nd.name === 'Транспорт') return 'Транспорт';
      return null;
    };
    /* C) Крос-проєктність: які гранти обслуговує напрямок */
    const projectsOf = nd => {
      const set = new Set();
      (function w(n) {
        (n.tags || []).forEach(t => { if (/УВКБ|ГФУ|SHARP|DOS/.test(t)) set.add(t.trim()); });
        (n.children || []).forEach(w);
      })(nd);
      return [...set];
    };
    const clusterNodes = CLUSTERS.map(cl => {
      const kids = mergedDepts.filter(nd => cl.groups.includes(groupOfNode(nd)));
      if (!kids.length) return null;
      mergedDepts = mergedDepts.filter(nd => !kids.includes(nd));
      /* D) одиночні експерти (без команди) — компактним боксом */
      const solo = kids.filter(k => !(k.children || []).length && k.kind === 'person');
      const rest = kids.filter(k => !solo.includes(k));
      let inner;
      if (solo.length >= 2) {
        solo.forEach(s => { s.noStack = true; });
        inner = rest.concat([{
          id: 'pack-solo-' + slug(cl.name), kind: 'pack',
          name: 'Експертні функції', role: solo.length + ' позицій',
          type: 'group', color: cl.color, noStack: true,
          tags: [solo.length + ' осіб'],
          children: solo
        }]);
      } else {
        inner = rest.concat(solo); // одиночні картки лишаються як є
      }
      inner.forEach(k => {
        if (k.kind === 'person' || k.kind === 'vac') {
          const pr = projectsOf(k);
          if (pr.length > 1) k.tags = [pr.length + ' проєкти'].concat((k.tags || []).slice(0, 1));
        }
      });
      let people = 0, vacs = 0;
      inner.forEach(k => (function c(n){ if(n.kind==='person')people++; if(n.kind==='vac')vacs++; (n.children||[]).forEach(c); })(k));
      return {
        id: 'cl-' + slug(cl.name), kind: 'group',
        name: cl.name, role: 'служби організації · крос-проєктні',
        type: 'group', color: cl.color,
        tags: [people + ' осіб'].concat(vacs ? [vacs + ' вак.'] : []),
        children: inner
      };
    }).filter(Boolean);
    mergedDepts = clusterNodes.concat(mergedDepts);
    if (secAsAll.length || secVacsAll.length) mergedDepts.push({
      id: 'g-org-security-dept', kind: 'group',
      name: 'Безпека', role: 'центральна команда',
      type: 'group', color: '#ff8c42',
      tags: [(secAsAll.length + secVacsAll.length) + ' поз.'],
      children: sortPeople(secAsAll.slice()).map(personNode).concat(secVacsAll.map(vacancyNode))
    });

    const exclude = new Set([head.assignment_id, ...DB.org.deputies.map(d => d.assignment_id),
      ...orgAs.map(a => a.assignment_id), ...secAsAll.map(a => a.assignment_id)]);
    const excludeVac = new Set(secVacsAll.map(v => v.vacancy_id).concat(orgVacs.map(v => v.vacancy_id)));
    const headNode = orgPersonNode(head);
    headNode.chain = true;
    const depNodes = DB.org.deputies.map(orgPersonNode);
    depNodes.forEach(d => d.chain = true);
    let projTrees = DB.projects.map(p => buildProjectTree(p.project_id, { exclude, excludeVac }));
    // ГФУ: один менеджер проєкту на два гранти — обидва блоки під спільною карткою PM
    const gfuIdx = projTrees
      .map((t, i) => ({ t, i, pid: DB.projects[i].project_id }))
      .filter(x => SHARED_PM_PROJECTS.includes(x.pid));
    if (gfuIdx.length === 2) {
      const trunks = gfuIdx.map(x => x.t.children[0]).filter(n => n && n.id === 'v-shared-pm');
      if (trunks.length === 2) {
        // знімаємо ствол з кожного блоку, лишаючи його вміст
        gfuIdx.forEach((x, k) => { x.t.children = trunks[k].children; });
        // асистенти PM обох грантів ГФУ допомагають один одному —
        // на загальній схемі вони на ОДНІЙ лінії під спільним менеджером
        const isAPM = n => n.kind === 'person' && /associate project manager|асистент керівника проєкту/i.test(n.role || '');
        const apms = [];
        gfuIdx.forEach(x => {
          const own = (x.t.children || []).filter(isAPM);
          own.forEach(n => { n.noStack = true; apms.push(n); });
          x.t.children = (x.t.children || []).filter(n => !isAPM(n));
        });
        const sharedPm = {
          id: 'v-shared-pm', kind: 'vac', name: 'Вакансія',
          role: 'Project Manager / Менеджер проєкту (спільний для двох проєктів ГФУ)',
          type: 'position', color: '#ff4f4f', chain: true,
          tags: [sharedPmLabel()],
          children: apms.concat(gfuIdx.map(x => x.t))
        };
        projTrees = projTrees.filter(t => !gfuIdx.some(x => x.t === t));
        projTrees.splice(1, 0, sharedPm);
      }
    }
    if (depNodes.length) {
      // Голова → Заступник → Head of program → [проєкти + департаменти на одній лінії]
      // Голова → Заступник → Head of program → керівники напрямків і проєкти
      const hop = headOfProgramNode();
      const line = projTrees.concat(mergedDepts);
      if (hop) {
        hop.children = line;
        depNodes[0].children = depNodes.slice(1).concat([hop]);
      } else {
        depNodes[0].children = depNodes.slice(1).concat(line);
      }
      headNode.children = [depNodes[0]];
    } else {
      headNode.children = projTrees.concat(mergedDepts);
    }
    root.children = [makeHqNode('all', [headNode])];
  } else {
    root.children = DB.projects.map(p => buildProjectTree(p.project_id));
  }
  return root;
}

/* ================================================================
   4. РЕНДЕР ДЕРЕВА (движок из наброска, доработан)
   ================================================================ */
let currentView = 'all';
let currentTree = null;
let collapsed = new Set();
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function createCard(node) {
  const el = document.createElement('div');
  el.className = `card ${node.type}`;
  el.id = `card-${node.id}`;
  el.setAttribute('data-person', node.personId || '');
  el.setAttribute('data-search',
    `${node.name || ''} ${translitUA(node.name || '')} ${node.role || ''} ${(node.tags || []).join(' ')} ${node.email || ''} ${node.phone || ''}`);
  el.style.borderTopColor = node.color;

  const bg = node.color + '18';
  const tags = (node.tags || []).slice(0, 2).map(t =>
    `<span class="card-tag" style="background:${bg};color:${node.color}">${esc(dispTag(t))}</span>`).join('');
  const descendants = countDescendants(node);

  el.innerHTML = `
    ${tags}
    <div class="card-name">${esc(dispName(node)) || '—'}</div>
    ${node.role ? `<div class="card-role">${esc(dispRole(node))}</div>` : ''}
    ${node.email ? `<div class="card-email">✉ ${esc(node.email)}</div>` : ''}
    ${node.phone ? `<div class="card-phone">📞 ${esc(node.phone)}</div>` : ''}
    ${node.children && node.children.length ? `<div class="card-badge" style="background:${node.color}">${descendants}</div>` : ''}
  `;
  el.addEventListener('click', () => openInfo(node));
  return el;
}
function countDescendants(node) {
  let n = 0;
  (node.children || []).forEach(c => { n += 1 + countDescendants(c); });
  return n;
}

function renderTree(node, container) {
  const branch = document.createElement('div');
  branch.className = 'tree-node';
  branch.id = `node-${node.id}`;
  branch.appendChild(createCard(node));

  if (node.children && node.children.length) {
    const btn = document.createElement('button');
    btn.className = 'toggle-btn';
    btn.textContent = collapsed.has(node.id) ? '+' : '−';
    btn.addEventListener('click', e => {
      e.stopPropagation();
      collapsed.has(node.id) ? collapsed.delete(node.id) : collapsed.add(node.id);
      rerender();
    });
    branch.appendChild(btn);

    if (!collapsed.has(node.id)) {
      const row = document.createElement('div');
      row.className = 'children-row';
      node.children.forEach(ch => renderTree(ch, row));
      branch.appendChild(row);
    }
  }
  container.appendChild(branch);
}

function rerender() {
  const chart = document.getElementById('orgChart');
  chart.innerHTML = '';
  renderTree(currentTree, chart);
  applySearchHighlights();
}

function defaultCollapse(tree) {
  collapsed = new Set();
  (function walk(n, depth) {
    const isBranchGroup = (n.kind === 'group' || n.kind === 'loc') && !n.chain;
    const isDeptLead = n.kind === 'person' && depth >= 2 && !n.chain && n.children && n.children.length;
    if (n.children && n.children.length &&
        (isBranchGroup || isDeptLead || (currentView === 'all' && depth >= 2)))
      collapsed.add(n.id);
    (n.children || []).forEach(c => walk(c, depth + 1));
  })(tree, 0);
}

function switchView(view) {
  currentView = view;
  currentTree = buildTree(view);
  defaultCollapse(currentTree);
  renderTabs();
  renderStats();
  renderSidebar();
  rerender();
  closeInfo();
  document.getElementById('chartArea').scrollTo?.({ top: 0, left: 0 });
  // если активен поиск — переприменяем его к новой вкладке
  if (viewMode === 'canvas') renderCanvas();
  const q = document.getElementById('searchBox').value.trim();
  if (q) dispatchSearch(q, false);
}

function renderTabs() {
  const bar = document.getElementById('tabsBar');

    const b = document.createElement('button');

                  (count != null ? `<span class="tab-count">${count}</span>` : '');

    mk(p.project_id, T(p.sheet_name.trim()), n, projColor(p.project_id));

function renderStats() {

    count: new Set(effectiveAssignments(p.project_id).map(a => a.person_id)).size,

  }));

    ? DB.assignments
    : effectiveAssignments(currentView);

  // Руководство: лидеры текущего вида; без таблицы финансирования — плюс орг-уровень
  const lead = section(UI[lang].leadership);
  const seen = new Set();
  const orgLayer = (currentView !== 'all' && currentView !== 'vac')
    ? [DB.org.head, ...DB.org.deputies].filter(Boolean) : [];
  orgLayer.concat(sortPeople(inView.filter(a => a.cls.rank <= 2).slice())).forEach(a => {
    if (seen.has(a.person_id)) return;
    seen.add(a.person_id);
    item(lead, {
      color: a.cls.color, name: lang === 'en' ? translitUA(shortName(a.personName)) : shortName(a.personName),
      sub: a.email, sub2: a.phoneStr,
      onclick: () => focusPerson(a.person_id, a.assignment_id)

const shortName = n => n.split('(')[0].trim().split(/\s+/).slice(0, 2).join(' ');

/* ================================================================
   6. ФОКУС / ИНФО-ПАНЕЛЬ / ПОИСК
   ================================================================ */
function collectAllNodes(node, result) {
  result.push(node);
  (node.children || []).forEach(ch => collectAllNodes(ch, result));
}
function expandPathTo(targetId, node) {
  if (!node.children || !node.children.length) return false;
  for (const ch of node.children) {
    if (ch.id === targetId || expandPathTo(targetId, ch)) {
      collapsed.delete(node.id);
      return true;
    }
  }
  return false;
}
function flashCard(id) {
  setTimeout(() => {
    const el = document.getElementById('card-' + id);
    if (!el) return;
    el.scrollIntoView?.({ behavior: 'smooth', block: 'center', inline: 'center' });
    el.classList.add('highlight-match');
    setTimeout(() => { if (!document.getElementById('searchBox').value.trim()) el.classList.remove('highlight-match'); }, 2500);
  }, 100);
}
function focusPerson(personId, preferAssignment) {
  const all = [];
  collectAllNodes(currentTree, all);
  let node = all.find(n => n.kind === 'person' && n.id === 'a' + preferAssignment) ||
             all.find(n => n.personId === personId);
  if (!node) { // человек не в этой вкладке — переключаемся на «Всі»
    switchView('all');
    return focusPerson(personId, preferAssignment);
  }
  expandPathTo(node.id, currentTree);
  rerender();
  flashCard(node.id);
  openInfo(node);
}
function focusLocation(lid) {
  const all = [];
  collectAllNodes(currentTree, all);
  const node = all.find(n => n.kind === 'loc' && n.id.endsWith('-' + lid));
  if (!node) return;
  expandPathTo(node.id, currentTree);
  collapsed.delete(node.id);
  rerender();
  flashCard(node.id);
}
function focusNode(id) {
  expandPathTo(id, currentTree);
  rerender();
  flashCard(id);
}

        <div class="info-detail-value">${esc(dispPos(a.position_text))}</div></div></div>`;
    });

    // Финансирование (столбец E): из каких проектов финансируется
    if (DB.hasFunding) {
      const f = DB.fundingByPerson.get(node.personId);

      if (f && f.size) {
        html += [...f].map(pid => {
          const c = projColor(pid);
          return `<span class="card-tag" style="background:${c}18;color:${c};margin:2px">${esc(T(DB.projectById.get(pid)?.sheet_name?.trim() || pid))}</span>`;
        }).join('');
      } else {
        html += `<div class="info-detail"><div class="info-detail-value">${UI[lang].noFunding}</div></div>`;
      }

  if (node.tags && node.tags.length) {
    html += `<div class="info-section"><div class="info-section-title">${UI[lang].tags}</div>`;
    html += node.tags.map(t => `<span class="card-tag" style="background:${bg};color:${color};margin:2px">${esc(dispTag(t))}</span>`).join('');
    html += '</div>';
  }
  if (node.children && node.children.length) {
    html += `<div class="info-section"><div class="info-section-title">${UI[lang].members} (${node.children.length})</div>`;
    node.children.forEach(c => {
      html += `<div class="info-child" onclick="focusNode('${c.id}')">
        <div class="info-child-dot" style="background:${c.color}"></div>
        <div><div style="font-size:12px;font-weight:500">${esc(dispName(c)) || '—'}</div>
        <div style="font-size:11px;color:var(--text-muted)">${esc(dispRole(c).slice(0, 70))}</div></div>
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('infoBody').innerHTML = html;
}
function closeInfo() { document.getElementById('infoPanel').classList.remove('open'); }

function expandAll() { collapsed.clear(); rerender(); }
function collapseAll() {
  (function collect(n) {
    if (n.children && n.children.length) { collapsed.add(n.id); n.children.forEach(collect); }
  })(currentTree);
  collapsed.delete(currentTree.id);
  rerender();
}

/* ── Поиск ── */
let searchMatches = [];
let searchIdx = 0;

function applySearchHighlights() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(card => {
    const data = (card.getAttribute('data-search') || '').toLowerCase();
    const isMatch = !!q && data.includes(q);
    card.classList.toggle('highlight-match', isMatch);
    card.classList.toggle('search-dim', !!q && !isMatch);
  });
}
function goToMatch(idx) {
  if (!searchMatches.length) return;
  searchIdx = (idx + searchMatches.length) % searchMatches.length;
  const node = searchMatches[searchIdx];
  expandPathTo(node.id, currentTree);
  rerender();
  setTimeout(() => {
    const el = document.getElementById('card-' + node.id);
    if (el) el.scrollIntoView?.({ behavior: 'smooth', block: 'center', inline: 'center' });
  }, 80);
  document.getElementById('sarrIdx').textContent = (searchIdx + 1) + ' / ' + searchMatches.length;
}
function runSearchCards(q) {
  q = q.toLowerCase().trim();
  const pill = document.getElementById('searchPill');
  const arrows = document.getElementById('searchArrows');
  if (!q) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('highlight-match', 'search-dim'));
    pill.style.display = 'none';
    arrows.classList.remove('on');
    searchMatches = [];
    return;
  }
  const allNodes = [];
  collectAllNodes(currentTree, allNodes);
  searchMatches = allNodes.filter(n => {
    const s = ((n.name || '') + ' ' + translitUA(n.name || '') + ' ' + (n.role || '') + ' ' + (n.tags || []).join(' ') + ' ' +
               (n.email || '') + ' ' + (n.phone || '')).toLowerCase();
    return s.includes(q);
  });
  if (!searchMatches.length) {
    applySearchHighlights();
    pill.textContent = UI[lang].notFound;
    pill.style.display = 'block';
    pill.style.background = '#ef4444';
    arrows.classList.remove('on');
    return;
  }
  pill.textContent = searchMatches.length + ' ' + UI[lang].found;
  pill.style.display = 'block';
  pill.style.background = 'var(--gold)';
  arrows.classList.add('on');
  searchIdx = 0;
  goToMatch(0);
}
document.getElementById('searchBox').addEventListener('input', function () { dispatchSearch(this.value, false); });
document.getElementById('sarrDown').addEventListener('click', () => { if (viewMode === 'canvas') cvSearch(document.getElementById('searchBox').value, true); else goToMatch(searchIdx + 1); });
document.getElementById('sarrUp').addEventListener('click', () => { if (viewMode === 'canvas') cvSearch(document.getElementById('searchBox').value, true); else goToMatch(searchIdx - 1); });
document.getElementById('searchBox').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (viewMode === 'canvas') cvSearch(this.value, true);
    else goToMatch(searchIdx + (e.shiftKey ? -1 : 1));
  }
  if (e.key === 'Escape') { this.value = ''; this.dispatchEvent(new Event('input')); }
});

/* ================================================================
   8. I18N: UA ⇄ EN одной кнопкой.
   UA — как в источнике (должности двуязычные «через слэш»);
   EN — полный перевод: имена по КМУ-2010, англ. часть должностей,
   словари для отделов/интерфейса, транслит остального.
   ================================================================ */
let lang = 'ua';

const TR_MAP = { 'а':'a','б':'b','в':'v','г':'h','ґ':'g','д':'d','е':'e','ж':'zh','з':'z','и':'y',
  'і':'i','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u',
  'ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'shch','ь':'','ю':'iu','я':'ia','є':'ie',
  'ї':'i','й':'i','ъ':'','ы':'y','э':'e','’':'', '\u02bc':'' };
const TR_START = { 'є':'ye','ї':'yi','й':'y','ю':'yu','я':'ya' };
function translitUA(s) {
  if (!s) return s || '';
  let out = '', prevIsLetter = false;
  for (const ch of s) {
    const lower = ch.toLowerCase();
    const isCyr = /[а-яіїєґё’\u02bc]/i.test(ch);
    let t;
    if (isCyr) {
      t = (!prevIsLetter && TR_START[lower] !== undefined) ? TR_START[lower] : TR_MAP[lower];
      if (t === undefined) t = ch;
      if (ch === ch.toUpperCase() && ch !== ch.toLowerCase())
        t = t.charAt(0).toUpperCase() + t.slice(1);
    } else t = ch;
    out += t;
    prevIsLetter = /[а-яa-zіїєґё]/i.test(ch);
  }
  return out;
}
const cyrRatio = s => { const c = (s.match(/[а-яіїєґ]/gi) || []).length; return s.length ? c / s.length : 0; };

/* «Head of finance / Головний бухгалтер» → английская часть (для EN) */
function pickLangEN(text) {
  if (!text) return '';
  const parts = text.split('/').map(p => p.trim()).filter(Boolean);
  const en = parts.filter(p => cyrRatio(p) < 0.3);
  if (en.length) return en.join(' / ');
  return translitUA(text);
}
