/* ================================================================
   10. ПОЛОТНО (органограмма целиком, zoom/pan) — вторая
   визуализация того же дерева; переключение одной кнопкой.
   ================================================================ */
let viewMode = 'cards';
const NW = 132, NH = 52, HGAP = 12, VGAP = 34, SGAP = 6, MAXSTACK = 8;

function measureTree(node) {
  const kids = node.children || [];
  const units = [];
  let leafBuf = [];
  const MINROW = 8; // до 8 карток — паралельно в ряд; більше — компактні стовпчики
  const flushLeaves = () => {
    if (leafBuf.length && leafBuf.length <= MINROW) {
      leafBuf.forEach(n => units.push({ kind: 'stack', stack: [n], w: NW, h: NH }));
      leafBuf = [];
      return;
    }
    for (let i = 0; i < leafBuf.length; i += MAXSTACK) {
      const stack = leafBuf.slice(i, i + MAXSTACK);
      units.push({ kind: 'stack', stack, w: NW, h: stack.length * NH + (stack.length - 1) * SGAP });
    }
    leafBuf = [];
  };
  kids.forEach(k => {
    if ((k.children || []).length) {
      flushLeaves();
      measureTree(k);
      units.push({ kind: 'branch', node: k, w: k._w, h: k._h });
    } else if (k.noStack) {
      flushLeaves();
      units.push({ kind: 'stack', stack: [k], w: NW, h: NH });
    } else leafBuf.push(k);
  });
  flushLeaves();
  node._units = units;
  if (!units.length) { node._w = NW; node._h = NH; return; }
  const uw = units.reduce((s, u) => s + u.w, 0) + HGAP * (units.length - 1);
  node._w = Math.max(NW, uw);
  node._h = NH + VGAP + Math.max(...units.map(u => u.h));
  node._uw = uw;
}
function placeTree(node, x, y) {
  node._x = x + node._w / 2 - NW / 2;
  node._y = y;
  if (!node._units.length) return;
  let cx = x + (node._w - node._uw) / 2;
  node._units.forEach(u => {
    if (u.kind === 'branch') {
      placeTree(u.node, cx, y + NH + VGAP);
      u.topX = u.node._x + NW / 2;
    } else {
      u.stack.forEach((leaf, i) => {
        leaf._x = cx; leaf._y = y + NH + VGAP + i * (NH + SGAP);
        leaf._units = [];
      });
      u.topX = cx + NW / 2;
    }
    u.topY = y + NH + VGAP;
    cx += u.w + HGAP;
  });
}
function wrap2(s, max) {
  s = (s || '').trim();
  if (s.length <= max) return [s];
  const words = s.split(/\s+/);
  let l1 = '', i = 0;
  while (i < words.length && (l1 + ' ' + words[i]).trim().length <= max) { l1 = (l1 + ' ' + words[i]).trim(); i++; }
  if (!l1) { l1 = s.slice(0, max); return [l1, s.slice(max, max * 2 - 1) + (s.length > max * 2 - 1 ? '…' : '')]; }
  let l2 = words.slice(i).join(' ');
  if (l2.length > max) l2 = l2.slice(0, max - 1) + '…';
  return l2 ? [l1, l2] : [l1];
}

let cvTree = null, cvFlat = [];
function nodeSVG(n) {
  const color = n.color || '#4f8ef7';
  const nameLines = wrap2(dispName(n), 22);
  const roleLines = n.role ? wrap2(dispRole(n), 30) : [];
  const kids = countDescendants(n);
  const cls = 'nd' + (n.kind === 'vac' || (n.kind === 'pack' && n.type === 'position') ? ' vac' : '') + (n.kind === 'pack' ? ' pack' : '');
  let ty = 13, t = '';
  nameLines.forEach(l => { t += `<text class="nm" x="${NW / 2}" y="${ty}" text-anchor="middle">${esc(l)}</text>`; ty += 9; });
  roleLines.forEach(l => { t += `<text class="rl" x="${NW / 2}" y="${ty}" text-anchor="middle">${esc(l)}</text>`; ty += 8; });
  const tag = (n.tags && n.tags[0])
    ? `<text class="tg" x="${NW / 2}" y="${NH - 5}" text-anchor="middle" fill="${color}">${esc(dispTag(String(n.tags[0])).slice(0, 30))}${kids ? ' · ' + kids : ''}</text>`
    : (kids ? `<text class="tg" x="${NW / 2}" y="${NH - 5}" text-anchor="middle" fill="${color}">${kids}</text>` : '');
  return `<g class="${cls}" data-id="${esc(n.id)}" transform="translate(${n._x},${n._y})">
    <title>${esc(dispName(n))}${n.role ? ' — ' + esc(dispRole(n)) : ''}</title>
    <rect class="box" width="${NW}" height="${NH}" rx="6"/>
    <rect class="strip" width="${NW}" height="3" fill="${color}"/>
    ${t}${tag}</g>`;
}

function renderCanvas() {
  cvTree = buildTree(currentView); // полное дерево, без сворачивания
  measureTree(cvTree);
  placeTree(cvTree, 0, 20);
  cvFlat = [];
  const boxes = [], edges = [];
  (function walk(n) {
    cvFlat.push(n);
    boxes.push(nodeSVG(n));
    const px = n._x + NW / 2, py = n._y + NH;
    const units = n._units || [];
    if (units.length) {
      const busY = n._y + NH + VGAP / 2;
      const xs = units.map(u => u.topX).concat([px]);
      edges.push(`<path class="edge" d="M${px},${py} V${busY}"/>`);
      edges.push(`<path class="edge" d="M${Math.min(...xs)},${busY} H${Math.max(...xs)}"/>`);
      units.forEach(u => {
        edges.push(`<path class="edge" d="M${u.topX},${busY} V${u.topY}"/>`);
        if (u.kind === 'branch') walk(u.node);
        else u.stack.forEach((leaf, i) => {
          cvFlat.push(leaf);
          boxes.push(nodeSVG(leaf));
          if (i > 0) edges.push(`<path class="edge" d="M${u.topX},${leaf._y - SGAP} V${leaf._y}"/>`);
        });
      });
    }
  })(cvTree);
  document.getElementById('cvViewport').innerHTML =
    '<g>' + edges.join('') + '</g><g>' + boxes.join('') + '</g>';
  document.querySelectorAll('#cvViewport .nd').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const n = cvFlat.find(x => x.id === el.getAttribute('data-id'));
      if (n) openInfo(n);
    });
  });
  cvFit();
}

let cvScale = 1, cvTx = 0, cvTy = 0;
function cvApply() {
  document.getElementById('cvViewport')
    .setAttribute('transform', `translate(${cvTx},${cvTy}) scale(${cvScale})`);
  document.getElementById('cvZoomLabel').textContent = Math.round(cvScale * 100) + '%';
}
function cvZoomAt(cx, cy, f) {
  const ns = Math.min(4, Math.max(0.03, cvScale * f));
  const k = ns / cvScale;
  cvTx = cx - k * (cx - cvTx);
  cvTy = cy - k * (cy - cvTy);
  cvScale = ns;
  cvApply();
}
function cvZoomBy(f) {
  const r = document.getElementById('cvStage').getBoundingClientRect();
  cvZoomAt(r.width / 2, r.height / 2, f);
}
function cvZoomTo(s) {
  const r = document.getElementById('cvStage').getBoundingClientRect();
  cvZoomAt(r.width / 2, r.height / 2, s / cvScale);
}
function cvFit() {
  if (!cvTree) return;
  const r = document.getElementById('cvStage').getBoundingClientRect();
  if (!r.width || !r.height) return;
  const w = cvTree._w, h = cvTree._h + 40;
  cvScale = Math.min(r.width / w, r.height / h) * 0.97;
  cvTx = (r.width - w * cvScale) / 2;
  cvTy = (r.height - h * cvScale) / 2;
  cvApply();
}
function cvCenterOn(node) {
  const r = document.getElementById('cvStage').getBoundingClientRect();
  const s = Math.max(cvScale, 0.9);
  cvScale = s;
  cvTx = r.width / 2 - (node._x + NW / 2) * s;
  cvTy = r.height / 2 - (node._y + NH / 2) * s;
  cvApply();
}
(function initCanvasPanZoom() {
  const stage = document.getElementById('cvStage');
  stage.addEventListener('wheel', e => {
    e.preventDefault();
    const r = stage.getBoundingClientRect();
    cvZoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? 1.15 : 0.87);
  }, { passive: false });
  let drag = null;
  stage.addEventListener('mousedown', e => {
    drag = { x: e.clientX, y: e.clientY, tx: cvTx, ty: cvTy };
    stage.classList.add('dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    cvTx = drag.tx + (e.clientX - drag.x);
    cvTy = drag.ty + (e.clientY - drag.y);
    cvApply();
  });
  window.addEventListener('mouseup', () => { drag = null; stage.classList.remove('dragging'); });
  let pinch = null;
  const tDist = e => Math.hypot(
    e.touches[0].clientX - e.touches[1].clientX,
    e.touches[0].clientY - e.touches[1].clientY);
  const tMid = (e, r) => ({
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top });
  stage.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      drag = null;
      pinch = { d: tDist(e) };
    } else if (e.touches.length === 1) {
      pinch = null;
      drag = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx: cvTx, ty: cvTy };
    }
  }, { passive: true });
  stage.addEventListener('touchmove', e => {
    if (pinch && e.touches.length === 2) {
      e.preventDefault(); // щипок масштабирует полотно, а не страницу
      const nd = tDist(e);
      if (pinch.d > 0) {
        const r = stage.getBoundingClientRect();
        const m = tMid(e, r);
        cvZoomAt(m.x, m.y, nd / pinch.d);
      }
      pinch.d = nd;
    } else if (drag && e.touches.length === 1) {
      cvTx = drag.tx + (e.touches[0].clientX - drag.x);
      cvTy = drag.ty + (e.touches[0].clientY - drag.y);
      cvApply();
    }
  }, { passive: false });
  stage.addEventListener('touchend', e => {
    if (e.touches.length === 0) { drag = null; pinch = null; }
    else if (e.touches.length === 1) {
      pinch = null;
      drag = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx: cvTx, ty: cvTy };
    }
  });
})();

function downloadSVG() {
  if (!cvTree) renderCanvas();
  const svg = document.getElementById('cvSvg').cloneNode(true);
  svg.setAttribute('width', cvTree._w);
  svg.setAttribute('height', cvTree._h + 40);
  svg.querySelector('#cvViewport').setAttribute('transform', 'translate(0,0) scale(1)');
  const light = document.body.classList.contains('light');
  const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  style.textContent = light
    ? `.edge{stroke:#7787a3;stroke-width:1.2;fill:none}.nd rect.box{fill:#fff;stroke:#8d99b5}.nd.vac rect.box{stroke:#c0392b;stroke-dasharray:4 3}.nd text.nm{fill:#17233c;font:600 10.5px sans-serif}.nd text.rl{fill:#4a5872;font:8.5px sans-serif}.nd text.tg{font:600 7.5px sans-serif}`
    : `svg{background:#0a0f1c}.edge{stroke:#3a4a75;stroke-width:1.2;fill:none}.nd rect.box{fill:#141e32;stroke:rgba(79,142,247,.35)}.nd.vac rect.box{stroke:#ff4f4f;stroke-dasharray:4 3}.nd text.nm{fill:#e2e8f0;font:600 10.5px sans-serif}.nd text.rl{fill:#8b9bb8;font:8.5px sans-serif}.nd text.tg{font:600 7.5px sans-serif}`;
  svg.insertBefore(style, svg.firstChild);
  if (light) {
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('width', '100%'); bg.setAttribute('height', '100%'); bg.setAttribute('fill', '#fff');
    svg.insertBefore(bg, svg.children[1]);
  }
  const blob = new Blob([new XMLSerializer().serializeToString(svg)], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'proliska_organogram_2026' + (currentView !== 'all' ? '_' + currentView : '') +
    (lang === 'en' ? '_en' : '') + (light ? '_light' : '') + '.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

function toggleViewMode() {
  viewMode = viewMode === 'cards' ? 'canvas' : 'cards';
  document.body.classList.toggle('canvas-mode', viewMode === 'canvas');
  applyUIStrings();
  if (viewMode === 'canvas') renderCanvas();
  const q = document.getElementById('searchBox').value.trim();
  if (q) dispatchSearch(q, false);
}

/* ── Поиск на полотне + единый диспетчер ── */
let cvMatches = [], cvIdx = 0;
function cvSearch(q, advance) {
  q = q.toLowerCase().trim();
  const pill = document.getElementById('searchPill');
  const arrows = document.getElementById('searchArrows');
  document.querySelectorAll('#cvViewport .nd.hl').forEach(el => el.classList.remove('hl'));
  if (!q) { cvMatches = []; pill.style.display = 'none'; arrows.classList.remove('on'); return; }
  cvMatches = cvFlat.filter(n =>
    ((n.name || '') + ' ' + translitUA(n.name || '') + ' ' + (n.role || '') + ' ' +
     (n.tags || []).join(' ') + ' ' + (n.email || '') + ' ' + (n.phone || ''))
      .toLowerCase().includes(q));
  if (!cvMatches.length) {
    pill.textContent = UI[lang].notFound;
    pill.style.display = 'block';
    pill.style.background = '#ef4444';
    arrows.classList.remove('on');
    return;
  }
  cvIdx = advance ? (cvIdx + 1) % cvMatches.length : 0;
  const node = cvMatches[cvIdx];
  const el = document.querySelector(`#cvViewport .nd[data-id="${(window.CSS && CSS.escape) ? CSS.escape(node.id) : node.id}"]`);
  if (el) el.classList.add('hl');
  cvCenterOn(node);
  pill.textContent = cvMatches.length + ' ' + UI[lang].found;
  pill.style.display = 'block';
  pill.style.background = 'var(--gold)';
  arrows.classList.add('on');
  document.getElementById('sarrIdx').textContent = (cvIdx + 1) + ' / ' + cvMatches.length;
}
function dispatchSearch(q, advance) {
  if (viewMode === 'canvas') cvSearch(q, advance);
  else runSearchCards(q);
}


function initFromSQL(text) {
  const tables = parseSQL(text);
  DB = buildDB(tables);
  cvTree = null;
  switchView('all');
  applyUIStrings();
  renderLegend();
}
initFromSQL(document.getElementById('sqlData').textContent);
